<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新陳代謝科住院醫師評估系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --border: #e2e6ea;
  --accent: #1a6b8a;
  --accent2: #22a5c7;
  --accent-light: #e8f4f8;
  --text: #1c2533;
  --text2: #5a6878;
  --text3: #8fa0b0;
  --red: #e05252;
  --yellow: #e09a30;
  --green: #3daa72;
  --red-light: #fdf0f0;
  --yellow-light: #fdf7ee;
  --green-light: #eef9f4;
  --shadow: 0 2px 12px rgba(26,107,138,0.08);
  --radius: 12px;
  --font: 'Noto Sans TC', sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--accent);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.sidebar-logo {
  padding: 28px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.sidebar-logo .sub { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 4px; }
.sidebar-logo .title { font-family: 'Playfair Display', serif; font-size: 15px; color: #fff; line-height: 1.4; }
.sidebar-nav { padding: 16px 0; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  font-size: 14px;
  font-weight: 400;
  transition: all 0.18s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: #22d4f5; font-weight: 500; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 11px; color: rgba(255,255,255,0.35); }

/* Main */
.main { margin-left: 220px; flex: 1; min-height: 100vh; }
.topbar {
  background: var(--surface);
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.today-badge {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 12px;
  font-family: var(--mono);
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 500;
}
.content { padding: 28px 32px; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.card-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
.card-body { padding: 18px 22px; }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* Stat boxes */
.stat-box {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  box-shadow: var(--shadow);
}
.stat-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-size: 32px; font-family: var(--mono); font-weight: 500; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Resident cards in dashboard */
.resident-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.resident-row:last-child { border-bottom: none; }
.resident-row:hover { background: var(--surface2); margin: 0 -22px; padding: 14px 22px; border-radius: 8px; }
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.red { background: var(--red); box-shadow: 0 0 0 3px rgba(224,82,82,0.2); }
.status-dot.yellow { background: var(--yellow); box-shadow: 0 0 0 3px rgba(224,154,48,0.2); }
.status-dot.green { background: var(--green); box-shadow: 0 0 0 3px rgba(61,170,114,0.2); }
.resident-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.resident-info { flex: 1; }
.resident-name { font-size: 14px; font-weight: 600; color: var(--text); }
.resident-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.resident-days {
  font-size: 12px;
  font-family: var(--mono);
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.days-red { background: var(--red-light); color: var(--red); }
.days-yellow { background: var(--yellow-light); color: var(--yellow); }
.days-green { background: var(--green-light); color: var(--green); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.18s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #135570; }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(224,82,82,0.2); }
.btn-danger:hover { background: #fde0e0; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-archive { background: #f0f4f8; color: var(--text2); border: 1px solid var(--border); }
.btn-archive:hover { background: var(--border); }

/* Form */
.form-group { margin-bottom: 18px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.18s;
  outline: none;
}
.form-input:focus { border-color: var(--accent2); }
.form-select {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  background: var(--surface);
  outline: none;
  cursor: pointer;
}
.form-select:focus { border-color: var(--accent2); }
textarea.form-input { resize: vertical; min-height: 80px; }

/* Score slider */
.score-item {
  background: var(--surface2);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.score-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.score-num { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--accent); }
.score-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, var(--accent2) 0%, var(--accent2) 50%, var(--border) 50%);
  outline: none;
  cursor: pointer;
}
.score-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 1px 4px rgba(26,107,138,0.3);
  cursor: pointer;
}
.score-ticks { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

/* Checkbox items */
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.check-item:hover { background: var(--accent-light); border-color: var(--accent2); }
.check-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.check-item label { font-size: 13px; color: var(--text); cursor: pointer; flex: 1; }

/* Tags */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
}
.tag-active { background: var(--green-light); color: var(--green); }
.tag-archived { background: #f0f0f0; color: #999; }

/* Table */
.table { width: 100%; border-collapse: collapse; }
.table th {
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); padding: 10px 14px; text-align: left;
  border-bottom: 2px solid var(--border);
}
.table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--surface2); }

/* Charts area */
.chart-container { position: relative; height: 280px; }
.chart-container-sm { position: relative; height: 200px; }
.chart-container-lg { position: relative; height: 360px; }

/* Sections */
.section-heading {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text3);
  margin: 24px 0 12px;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(28,37,51,0.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 16px;
  width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.2s ease;
}
.modal-wide { width: 780px; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { cursor: pointer; font-size: 20px; color: var(--text3); background: none; border: none; line-height: 1; }
.modal-body { padding: 22px 24px; }
.modal-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
  position: sticky; bottom: 0; background: var(--surface);
}

/* Radar chart area */
.radar-wrap { display: flex; align-items: center; justify-content: center; height: 280px; }

/* Score display badge */
.score-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
}
.score-badge.high { background: var(--green-light); color: var(--green); }
.score-badge.mid { background: var(--yellow-light); color: var(--yellow); }
.score-badge.low { background: var(--red-light); color: var(--red); }

/* Avatar colors */
.av1 { background: #4a90c4; }
.av2 { background: #7b68cc; }
.av3 { background: #e07b54; }
.av4 { background: #4aab7a; }
.av5 { background: #c45a8a; }
.av6 { background: #5ab5c4; }
.av7 { background: #c4a54a; }
.av8 { background: #8a5ac4; }

.hidden { display: none !important; }
.flex { display: flex; }
.gap-10 { gap: 10px; }
.mt-16 { margin-top: 16px; }
.text-center { text-align: center; }

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(26,107,138,0.2); }
.alert-success { background: var(--green-light); color: var(--green); border: 1px solid rgba(61,170,114,0.2); }

.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* Trend mini */
.trend-up { color: var(--green); font-size: 12px; }
.trend-down { color: var(--red); font-size: 12px; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* Page transitions */
.page { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sub">Metabolism Dept.</div>
    <div class="title">住院醫師<br>評估系統</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="nav-icon">◈</span> Dashboard
    </div>
    <div class="nav-item" onclick="showPage('residents')" id="nav-residents">
      <span class="nav-icon">◉</span> 學員管理
    </div>
    <div class="nav-item" onclick="showPage('evaluate')" id="nav-evaluate">
      <span class="nav-icon">◎</span> 填寫評估
    </div>
    <div class="nav-item" onclick="showPage('history')" id="nav-history">
      <span class="nav-icon">◇</span> 歷史紀錄
    </div>
    <div class="nav-item" onclick="showPage('stats')" id="nav-stats">
      <span class="nav-icon">◆</span> 統計分析
    </div>
  </nav>
  <div class="sidebar-footer">v1.0 · 測試版</div>
</aside>

<!-- Main content -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-sub" id="topbar-sub">新陳代謝科住院醫師評估追蹤</div>
    </div>
    <div class="topbar-right">
      <div class="today-badge" id="today-badge"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>

<!-- Modals -->
<!-- Add Resident Modal -->
<div class="modal-overlay" id="modal-add-resident">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新增學員</span>
      <button class="modal-close" onclick="closeModal('modal-add-resident')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input class="form-input" id="new-name" placeholder="輸入姓名" />
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">開始訓練日期</label>
          <input class="form-input" type="date" id="new-start" />
        </div>
        <div class="form-group">
          <label class="form-label">訓練年級</label>
          <select class="form-select" id="new-year">
            <option value="R1">R1</option>
            <option value="R2">R2</option>
            <option value="R3">R3</option>
            <option value="Fellow">Fellow</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-resident')">取消</button>
      <button class="btn btn-primary" onclick="addResident()">新增</button>
    </div>
  </div>
</div>

<!-- Archive Confirm Modal -->
<div class="modal-overlay" id="modal-archive">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">結束評估</span>
      <button class="modal-close" onclick="closeModal('modal-archive')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px;">確定要結束 <strong id="archive-name-display"></strong> 的評估？評估紀錄將保留，可隨時查閱。</p>
      <div class="form-group">
        <label class="form-label">結束日期</label>
        <input class="form-input" type="date" id="archive-date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-archive')">取消</button>
      <button class="btn btn-danger" onclick="confirmArchive()">確認結束評估</button>
    </div>
  </div>
</div>

<!-- Evaluation Modal -->
<div class="modal-overlay" id="modal-evaluate">
  <div class="modal modal-wide">
    <div class="modal-header">
      <span class="modal-title" id="eval-modal-title">填寫評估</span>
      <button class="modal-close" onclick="closeModal('modal-evaluate')">✕</button>
    </div>
    <div class="modal-body" id="eval-modal-body">
      <!-- filled dynamically -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-evaluate')">取消</button>
      <button class="btn btn-primary" onclick="saveEvaluation()">儲存評估</button>
    </div>
  </div>
</div>

<!-- History Detail Modal -->
<div class="modal-overlay" id="modal-eval-detail">
  <div class="modal modal-wide">
    <div class="modal-header">
      <span class="modal-title" id="detail-modal-title">評估詳情</span>
      <button class="modal-close" onclick="closeModal('modal-eval-detail')">✕</button>
    </div>
    <div class="modal-body" id="detail-modal-body"></div>
  </div>
</div>

<script>
// =========================================================
// DATA & STATE
// =========================================================
const SCORE_ITEMS = [
  { id: 's1', label: '糖尿病診斷與藥物調整', category: '臨床知識' },
  { id: 's2', label: '甲狀腺疾病評估與處置', category: '臨床知識' },
  { id: 's3', label: '骨質疏鬆症診斷與治療', category: '臨床知識' },
  { id: 's4', label: '代謝症候群與肥胖管理', category: '臨床知識' },
  { id: 's5', label: '檢驗數值判讀', category: '臨床知識' },
  { id: 's6', label: '病史詢問完整性', category: '臨床技能' },
  { id: 's7', label: '鑑別診斷能力', category: '臨床技能' },
  { id: 's8', label: '治療計畫制定與說明', category: '臨床技能' },
  { id: 's9', label: '病患溝通與衛教', category: '態度溝通' },
  { id: 's10', label: '病歷書寫品質', category: '態度溝通' },
  { id: 's11', label: '團隊合作與交班', category: '態度溝通' },
];
const CHECK_ITEMS = [
  { id: 'c1', label: '完成糖尿病個案報告' },
  { id: 'c2', label: '參與門診 ≥ 20 次' },
  { id: 'c3', label: '完成甲狀腺超音波判讀訓練' },
  { id: 'c4', label: '參與科內教學討論' },
];

const AVATAR_COLORS = ['av1','av2','av3','av4','av5','av6','av7','av8'];

function getAvatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % AVATAR_COLORS.length;
  return AVATAR_COLORS[h];
}
function getInitials(name) {
  return name.length <= 2 ? name : name.slice(-2);
}

// =========================================================
// GENERATE MOCK DATA
// =========================================================
function generateMockData() {
  const names = [
    '林佳慧','陳志明','王怡君','張文凱','李雅婷',
    '劉宗翰','吳美玲','黃建宏','許淑芬','蔡志遠',
    '鄭雅文','謝俊賢','洪雅琪','楊文哲','賴淑芳',
    '高明仁','邱秀蘭','潘建志','蘇怡婷','周明宏',
  ];
  const years = ['R1','R2','R3','Fellow'];
  const residents = [];
  const evaluations = [];

  // Generate residents from 2020 to 2025 (some archived, some active)
  let ridx = 0;
  for (let year = 2020; year <= 2025; year++) {
    // 2-4 residents per year
    const count = year >= 2025 ? 3 : (year === 2024 ? 4 : Math.floor(Math.random()*2)+2);
    for (let i = 0; i < count && ridx < names.length; i++, ridx++) {
      const startMonth = [2,7,8][Math.floor(Math.random()*3)]; // Feb, Jul, Aug
      const startDate = `${year}-${String(startMonth).padStart(2,'0')}-01`;
      const trainingYr = years[Math.min(ridx % 4, 3)];
      const isActive = year === 2025 && i < 3;
      let endDate = null;
      if (!isActive) {
        const endYear = year + 1;
        endDate = `${endYear}-07-31`;
      }
      const r = {
        id: `r${ridx+1}`,
        name: names[ridx],
        startDate,
        endDate,
        year: trainingYr,
        status: isActive ? 'active' : 'archived',
      };
      residents.push(r);

      // Generate evaluations monthly during their training
      const start = new Date(startDate);
      const end = endDate ? new Date(endDate) : new Date();
      let current = new Date(start);
      current.setMonth(current.getMonth() + 1);
      let evalIdx = 0;
      while (current <= end && evalIdx < 14) {
        // Simulate gradual improvement
        const progress = evalIdx / 12;
        const base = 4 + progress * 3 + (Math.random() - 0.3);
        const scores = {};
        SCORE_ITEMS.forEach(si => {
          scores[si.id] = Math.min(10, Math.max(1, Math.round(base + (Math.random()-0.5)*2)));
        });
        const checks = {};
        CHECK_ITEMS.forEach(ci => {
          checks[ci.id] = Math.random() < (0.3 + progress * 0.5);
        });
        evaluations.push({
          id: `e_${r.id}_${evalIdx}`,
          residentId: r.id,
          date: current.toISOString().split('T')[0],
          scores,
          checks,
          comment: evalIdx === 0 ? '初次評估，積極學習中。' :
            progress > 0.7 ? '進步明顯，臨床技能趨於成熟。' :
            progress > 0.4 ? '穩定進步，繼續加強診斷思維。' : '基礎知識尚待加強，鼓勵多問問題。'
        });
        current.setMonth(current.getMonth() + 1);
        evalIdx++;
      }
    }
  }

  return { residents, evaluations };
}

      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { min: 0, max: 10, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      },
      plugins: {
        legend: { display: true, position: 'bottom', labels: { font: { size: 10, family: "'Noto Sans TC'" }, boxWidth: 12, padding: 8 } }
      }
    }
  });
  activeCharts.push(tc);

  // Bar chart - last eval
  const lastEval = evs[evs.length-1];
  const bc = new Chart(document.getElementById('chart-history-bar'), {
    type: 'bar',
    data: {
      labels: SCORE_ITEMS.map(si => si.label),
      datasets: [{
        label: '最近評估',
        data: SCORE_ITEMS.map(si => lastEval.scores[si.id]),
        backgroundColor: SCORE_ITEMS.map(si => {
          const v = lastEval.scores[si.id];
          return v >= 7 ? 'rgba(61,170,114,0.7)' : v >= 5 ? 'rgba(224,154,48,0.7)' : 'rgba(224,82,82,0.7)';
        }),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: { min: 0, max: 10, grid: { color: 'rgba(0,0,0,0.04)' } },
        y: { ticks: { font: { size: 11, family: "'Noto Sans TC'" } } }
      },
      plugins: { legend: { display: false } }
    }
  });
  activeCharts.push(bc);
}

function goHistoryResident(id) {
  historySelectedId = id;
  showPage('history');
}

// =========================================================
// STATS PAGE
// =========================================================
function renderStats() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">各屆學員平均分數</span></div>
        <div class="card-body"><div class="chart-container"><canvas id="chart-stats-cohort"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">各評估項目歷年平均</span></div>
        <div class="card-body"><div class="chart-container"><canvas id="chart-stats-items"></canvas></div></div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">每月評估次數（2020–2026）</span></div>
        <div class="card-body"><div class="chart-container"><canvas id="chart-stats-monthly"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">勾選項目達成率</span></div>
        <div class="card-body"><div class="chart-container"><canvas id="chart-stats-checks"></canvas></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">所有學員歷次評估平均分分佈</span></div>
      <div class="card-body"><div class="chart-container-lg"><canvas id="chart-stats-dist"></canvas></div></div>
    </div>
  `;

  destroyCharts();

  // Cohort chart - average per resident
  const allR = DB.residents.filter(r => DB.evaluations.some(e => e.residentId === r.id));
  const cohortLabels = allR.map(r => r.name);
  const cohortData = allR.map(r => {
    const evs = DB.evaluations.filter(e => e.residentId === r.id);
    return +(evs.map(e => Object.values(e.scores).reduce((a,b)=>a+b,0)/SCORE_ITEMS.length).reduce((a,b)=>a+b,0)/evs.length).toFixed(2);
  });
  const cohortColors = allR.map(r => r.status === 'active' ? 'rgba(26,107,138,0.7)' : 'rgba(143,160,176,0.5)');
  const c1 = new Chart(document.getElementById('chart-stats-cohort'), {
    type: 'bar',
    data: {
      labels: cohortLabels,
      datasets: [{ label: '平均分', data: cohortData, backgroundColor: cohortColors, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { min: 0, max: 10 },
        x: { ticks: { font: { size: 10, family: "'Noto Sans TC'" } } }
      },
      plugins: { legend: { display: false } }
    }
  });
  activeCharts.push(c1);

  // Items chart - all-time average per score item
  const itemAvgs = SCORE_ITEMS.map(si => {
    const all = DB.evaluations.map(e => e.scores[si.id]).filter(Boolean);
    return +(all.reduce((a,b)=>a+b,0)/all.length).toFixed(2);
  });
  const c2 = new Chart(document.getElementById('chart-stats-items'), {
    type: 'radar',
    data: {
      labels: SCORE_ITEMS.map(si => si.label),
      datasets: [{
        label: '歷年平均',
        data: itemAvgs,
        backgroundColor: 'rgba(34,165,199,0.15)',
        borderColor: '#22a5c7',
        borderWidth: 2,
        pointBackgroundColor: '#1a6b8a',
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { r: { min: 0, max: 10, ticks: { stepSize: 2, font: { size: 9 } }, pointLabels: { font: { size: 10, family: "'Noto Sans TC'" } } } },
      plugins: { legend: { display: false } }
    }
  });
  activeCharts.push(c2);

  // Monthly count
  const monthlyCounts = {};
  DB.evaluations.forEach(e => {
    const ym = e.date.slice(0,7);
    monthlyCounts[ym] = (monthlyCounts[ym] || 0) + 1;
  });
  const sortedYMs = Object.keys(monthlyCounts).sort();
  const c3 = new Chart(document.getElementById('chart-stats-monthly'), {
    type: 'bar',
    data: {
      labels: sortedYMs.map(ym => ym.slice(2)),
      datasets: [{ label: '評估次數', data: sortedYMs.map(ym => monthlyCounts[ym]), backgroundColor: 'rgba(26,107,138,0.5)', borderRadius: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } },
        x: { ticks: { font: { size: 9 }, maxRotation: 45 } }
      },
      plugins: { legend: { display: false } }
    }
  });
  activeCharts.push(c3);

  // Checkboxes achievement rate
  const checkRates = CHECK_ITEMS.map(ci => {
    const total = DB.evaluations.length;
    const done = DB.evaluations.filter(e => e.checks[ci.id]).length;
    return +((done/total)*100).toFixed(1);
  });
  const c4 = new Chart(document.getElementById('chart-stats-checks'), {
    type: 'doughnut',
    data: {
      labels: CHECK_ITEMS.map(ci => ci.label),
      datasets: [{
        data: checkRates,
        backgroundColor: ['rgba(26,107,138,0.8)','rgba(34,165,199,0.8)','rgba(61,170,114,0.8)','rgba(224,154,48,0.8)'],
        borderWidth: 2,
        borderColor: '#fff',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11, family: "'Noto Sans TC'" }, padding: 12 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.raw}%` } }
      }
    }
  });
  activeCharts.push(c4);

  // Distribution
  const allAvgs = DB.evaluations.map(e => +(Object.values(e.scores).reduce((a,b)=>a+b,0)/SCORE_ITEMS.length).toFixed(1));
  const buckets = {};
  for (let v = 1; v <= 10; v += 0.5) buckets[v.toFixed(1)] = 0;
  allAvgs.forEach(v => { const k = (Math.round(v*2)/2).toFixed(1); if(buckets[k]!==undefined) buckets[k]++; });
  const c5 = new Chart(document.getElementById('chart-stats-dist'), {
    type: 'bar',
    data: {
      labels: Object.keys(buckets),
      datasets: [{
        label: '評估次數',
        data: Object.values(buckets),
        backgroundColor: Object.keys(buckets).map(k => {
          const v = parseFloat(k);
          return v >= 7 ? 'rgba(61,170,114,0.7)' : v >= 5 ? 'rgba(224,154,48,0.7)' : 'rgba(224,82,82,0.7)';
        }),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } },
        x: { ticks: { font: { size: 11 } } }
      },
      plugins: { legend: { display: false }, tooltip: { callbacks: { title: ctx => `平均 ${ctx[0].label} 分` } } }
    }
  });
  activeCharts.push(c5);
}

// =========================================================
// EVAL MODAL
// =========================================================
function openEvalModal(residentId) {
  evalTargetResidentId = residentId;
  const r = DB.residents.find(x => x.id === residentId);
  document.getElementById('eval-modal-title').textContent = `填寫評估 — ${r.name}`;
  const today = new Date().toISOString().split('T')[0];
  let body = `
    <div class="form-group">
      <label class="form-label">評估日期</label>
      <input class="form-input" type="date" id="eval-date" value="${today}" />
    </div>
    <hr class="divider">
    <div class="section-heading">計分項目（1–10）</div>
  `;
  const cats = {};
  SCORE_ITEMS.forEach(si => { if (!cats[si.category]) cats[si.category] = []; cats[si.category].push(si); });
  Object.entries(cats).forEach(([cat, items]) => {
    body += `<div style="font-size:12px;font-weight:700;color:var(--accent);margin:12px 0 8px;letter-spacing:0.5px;">${cat}</div>`;
    items.forEach(si => {
      body += `
        <div class="score-item">
          <div class="score-label">
            <span>${si.label}</span>
            <span class="score-num" id="val-${si.id}">5</span>
          </div>
          <input type="range" class="score-slider" min="1" max="10" value="5" id="sl-${si.id}"
            oninput="updateSlider('${si.id}',this.value)" />
          <div class="score-ticks"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
        </div>`;
    });
  });
  body += `
    <hr class="divider">
    <div class="section-heading">勾選項目</div>
    ${CHECK_ITEMS.map(ci => `
      <div class="check-item">
        <input type="checkbox" id="ck-${ci.id}" />
        <label for="ck-${ci.id}">${ci.label}</label>
      </div>`).join('')}
    <hr class="divider">
    <div class="form-group">
      <label class="form-label">評語 / 備註</label>
      <textarea class="form-input" id="eval-comment" placeholder="輸入整體評語或具體建議..."></textarea>
    </div>
  `;
  document.getElementById('eval-modal-body').innerHTML = body;
  openModal('modal-evaluate');
}

function updateSlider(id, val) {
  document.getElementById(`val-${id}`).textContent = val;
  const sl = document.getElementById(`sl-${id}`);
  const pct = ((val-1)/9*100).toFixed(1);
  sl.style.background = `linear-gradient(to right, var(--accent2) 0%, var(--accent2) ${pct}%, var(--border) ${pct}%)`;
}

function saveEvaluation() {
  const scores = {};
  SCORE_ITEMS.forEach(si => { scores[si.id] = parseInt(document.getElementById(`sl-${si.id}`).value); });
  const checks = {};
  CHECK_ITEMS.forEach(ci => { checks[ci.id] = document.getElementById(`ck-${ci.id}`).checked; });
  const ev = {
    id: `e_${Date.now()}`,
    residentId: evalTargetResidentId,
    date: document.getElementById('eval-date').value,
    scores, checks,
    comment: document.getElementById('eval-comment').value,
  };
  DB.evaluations.push(ev);
  saveData(DB);
  closeModal('modal-evaluate');
  showPage(currentPage);
}

// =========================================================
// EVAL DETAIL MODAL
// =========================================================
function showEvalDetail(evalId) {
  const e = DB.evaluations.find(x => x.id === evalId);
  const r = DB.residents.find(x => x.id === e.residentId);
  const avg = (Object.values(e.scores).reduce((a,b)=>a+b,0)/SCORE_ITEMS.length).toFixed(1);
  document.getElementById('detail-modal-title').textContent = `${r.name} - ${e.date} 評估詳情`;
  let body = `
    <div style="display:flex;gap:16px;margin-bottom:16px;">
      <div class="stat-box" style="flex:1;padding:14px;">
        <div class="stat-label">平均分數</div>
        <div class="stat-value" style="font-size:24px;">${avg}</div>
      </div>
      <div class="stat-box" style="flex:1;padding:14px;">
        <div class="stat-label">達成項目</div>
        <div class="stat-value" style="font-size:24px;">${Object.values(e.checks).filter(Boolean).length}/${CHECK_ITEMS.length}</div>
      </div>
    </div>
    <div class="section-heading">各項分數</div>
    <table class="table" style="margin-bottom:16px;">
      <thead><tr><th>項目</th><th>類別</th><th>分數</th></tr></thead>
      <tbody>
        ${SCORE_ITEMS.map(si => {
          const v = e.scores[si.id];
          const cls = v>=7?'high':v>=5?'mid':'low';
          return `<tr><td>${si.label}</td><td style="font-size:12px;color:var(--text3);">${si.category}</td><td><span class="score-badge ${cls}">${v}</span></td></tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="section-heading">勾選項目</div>
    ${CHECK_ITEMS.map(ci => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:16px;">${e.checks[ci.id] ? '✅' : '⬜'}</span>
        <span style="font-size:13px;color:${e.checks[ci.id]?'var(--text)':'var(--text3)'};">${ci.label}</span>
      </div>`).join('')}
    ${e.comment ? `
      <div class="section-heading" style="margin-top:16px;">評語</div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);">${e.comment}</div>
    ` : ''}
  `;
  document.getElementById('detail-modal-body').innerHTML = body;
  openModal('modal-eval-detail');
}

// =========================================================
// ADD RESIDENT
// =========================================================
function addResident() {
  const name = document.getElementById('new-name').value.trim();
  const start = document.getElementById('new-start').value;
  const year = document.getElementById('new-year').value;
  if (!name || !start) { alert('請填寫姓名與開始日期'); return; }
  const r = {
    id: `r_${Date.now()}`,
    name, startDate: start, endDate: null,
    year, status: 'active'
  };
  DB.residents.push(r);
  saveData(DB);
  closeModal('modal-add-resident');
  showPage('residents');
}

// =========================================================
// ARCHIVE
// =========================================================
function openArchiveModal(id) {
  archiveTargetId = id;
  const r = DB.residents.find(x => x.id === id);
  document.getElementById('archive-name-display').textContent = r.name;
  document.getElementById('archive-date').value = new Date().toISOString().split('T')[0];
  openModal('modal-archive');
}
function confirmArchive() {
  const r = DB.residents.find(x => x.id === archiveTargetId);
  r.status = 'archived';
  r.endDate = document.getElementById('archive-date').value;
  saveData(DB);
  closeModal('modal-archive');
  showPage(currentPage);
}

// =========================================================
// MODAL HELPERS
// =========================================================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// =========================================================
// INIT
// =========================================================
document.getElementById('today-badge').textContent = new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
showPage('dashboard');
</script>
</body>
</html>
